<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>日本酒マッチング</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
<header>
  <h1>日本酒マッチング</h1>
  <p class="sub">5問であなたに合う日本酒を診断します</p>
</header>

<main>
  <section id="quiz-section" class="card">
    <h2>診断</h2>

    <div class="q" data-key="fruity">
      <p>Q1. フルーティーが好き？</p>
      <div class="choice-row">
        <button class="choice" data-score="1">はい</button>
        <button class="choice" data-score="0">いいえ</button>
      </div>
    </div>

    <div class="q" data-key="acidity">
      <p>Q2. 酸味は好き？</p>
      <div class="choice-row">
        <button class="choice" data-score="1">はい</button>
        <button class="choice" data-score="0">いいえ</button>
      </div>
    </div>

    <div class="q" data-key="dryness">
      <p>Q3. 辛口が好き？</p>
      <div class="choice-row">
        <button class="choice" data-score="1">はい</button>
        <button class="choice" data-score="0">いいえ</button>
      </div>
    </div>

    <div class="q" data-key="aroma">
      <p>Q4. 香り重視？</p>
      <div class="choice-row">
        <button class="choice" data-score="1">はい</button>
        <button class="choice" data-score="0">いいえ</button>
      </div>
    </div>

    <div class="q" data-key="body">
      <p>Q5. コクが欲しい？</p>
      <div class="choice-row">
        <button class="choice" data-score="1">はい</button>
        <button class="choice" data-score="0">いいえ</button>
      </div>
    </div>
  </section>

  <section id="result-section" class="card">
    <h2>診断結果</h2>
    <div id="resultSummary"></div>
    <div id="recommendations"></div>
  </section>
</main>

<script src="app.js"></script>
</body>
</html>
