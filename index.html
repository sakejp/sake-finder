<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>東海道新幹線 × 日本酒マッチング</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
  <h1>東海道新幹線 × 日本酒マッチング</h1>
  <p class="sub">
    乗車駅を選び、5問答えるだけで<br>
    あなたに合う日本酒と駅近で買えるお店を提案します。
  </p>
</header>

<main>

  <!-- ① 駅選択 -->
  <section id="station-section" class="card">
    <h2>① 乗車駅を選ぶ</h2>
    <select id="stationSelect">
      <option value="">駅を選択</option>
      <option value="東京駅">東京駅</option>
      <option value="品川駅">品川駅</option>
      <option value="新横浜駅">新横浜駅</option>
      <option value="名古屋駅">名古屋駅</option>
      <option value="京都駅">京都駅</option>
      <option value="新大阪駅">新大阪駅</option>
    </select>
  </section>

  <!-- ② 診断 -->
  <section id="quiz-section" class="card">
    <h2>② 好み診断</h2>

    <!-- 進捗 -->
    <div id="progress">
      <span class="dot active"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <!-- 各質問 -->
    <div class="q" data-key="fruity">
      <div class="swipe-label like">LIKE</div>
      <div class="swipe-label nope">NOPE</div>
      <p>Q1. フルーティーな日本酒が好き？</p>
      <div class="choice-row">
        <button class="choice" data-score="1">好き</button>
        <button class="choice" data-score="0">控えめ</button>
      </div>
    </div>

    <div class="q" data-key="acidity">
      <div class="swipe-label like">LIKE</div>
      <div class="swipe-label nope">NOPE</div>
      <p>Q2. 酸味のある日本酒は？</p>
      <div class="choice-row">
        <button class="choice" data-score="1">好き</button>
        <button class="choice" data-score="0">苦手</button>
      </div>
    </div>

    <div class="q" data-key="dryness">
      <div class="swipe-label like">LIKE</div>
      <div class="swipe-label nope">NOPE</div>
      <p>Q3. 辛口と甘口、どちらが好み？</p>
      <div class="choice-row">
        <button class="choice" data-score="1">辛口</button>
        <button class="choice" data-score="0">甘口</button>
      </div>
    </div>

    <div class="q" data-key="aroma">
      <div class="swipe-label like">LIKE</div>
      <div class="swipe-label nope">NOPE</div>
      <p>Q4. 香りのタイプは？</p>
      <div class="choice-row">
        <button class="choice" data-score="1">華やか</button>
        <button class="choice" data-score="0">穏やか</button>
      </div>
    </div>

    <div class="q" data-key="body">
      <div class="swipe-label like">LIKE</div>
      <div class="swipe-label nope">NOPE</div>
      <p>Q5. 飲み口のイメージは？</p>
      <div class="choice-row">
        <button class="choice" data-score="1">コク</button>
        <button class="choice" data-score="0">軽快</button>
      </div>
    </div>
  </section>

  <!-- ③ 結果 -->
  <section id="result-section" class="card">
    <h2>③ 診断結果</h2>
    <div id="resultSummary" class="muted"></div>
    <div id="recommendations"></div>
    <div id="storeResults"></div>
  </section>

</main>

<footer>
  <small>© 2026 Sake Finder</small>
</footer>

<script src="app.js"></script>
</body>
</html>
``
